name: Déploiement GitHub Pages (BarberLink PWA)

# Met l'app en ligne (HTTPS) pour la rendre installable.
on:
  push:
    branches:
      - claude/barbershop-booking-platform-FsY79
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule mise en ligne à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer les fichiers du site
        run: |
          mkdir -p _site
          # Fichiers de la PWA (app multi-fichiers installable)
          cp index.html App.jsx manifest.json sw.js _site/
          cp icon-192.png icon-512.png apple-touch-icon.png _site/
          # Versions autonomes (accès direct possible)
          cp barberlink.html index_standalone.html _site/ || true

      - name: Téléverser l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
